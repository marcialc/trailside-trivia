name: Add park

# Generates a new park data file from a request and opens a PR for review.
# Trigger: a maintainer applies the `park-request` label to an issue (gates
# the paid AI run behind a human). Also runnable manually for testing.

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      park_name:
        description: Park name
        required: true
      region:
        description: "Region (State · subregion)"
        required: false
      slug:
        description: URL slug (optional)
        required: false
      decks:
        description: Decks to include (comma-separated)
        required: false
      notes:
        description: Notes & sources
        required: false

# Only react to the park-request label, never other labels.
jobs:
  generate:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'park-request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate park
        id: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CF_AIG_TOKEN: ${{ secrets.CF_AIG_TOKEN }}
          CF_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
          CF_AI_GATEWAY: ${{ vars.CF_AI_GATEWAY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          PARK_NAME: ${{ inputs.park_name }}
          PARK_REGION: ${{ inputs.region }}
          PARK_SLUG: ${{ inputs.slug }}
          PARK_DECKS: ${{ inputs.decks }}
          PARK_NOTES: ${{ inputs.notes }}
        run: node scripts/park-pipeline/run.mjs

      - name: Read PR body
        id: body
        run: |
          {
            echo 'text<<PIPELINE_EOF'
            cat pipeline-summary.md
            if [ -n "${{ github.event.issue.number }}" ]; then
              echo ""
              echo "Closes #${{ github.event.issue.number }}"
            fi
            echo 'PIPELINE_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: add-park/${{ steps.pipeline.outputs.slug }}
          base: main
          add-paths: |
            src/data/**
          commit-message: "Add ${{ steps.pipeline.outputs.park_name }} park"
          title: "Add ${{ steps.pipeline.outputs.park_name }} park"
          body: ${{ steps.body.outputs.text }}
          labels: park-request, needs-fact-check
          delete-branch: true

      - name: Comment failure on issue
        if: failure() && github.event.issue.number
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `The park pipeline failed — see the [run log](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
            });
